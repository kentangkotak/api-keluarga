version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keluarga_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - redis
    networks:
      - laravel

  nginx:
    image: nginx:stable-alpine
    container_name: keluarga_nginx
    restart: unless-stopped
    ports:
      - "8989:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  redis:
    image: redis:alpine
    container_name: keluarga_redis
    restart: unless-stopped
    ports:
      - "6479:6379"
    networks:
      - laravel

networks:
  laravel: